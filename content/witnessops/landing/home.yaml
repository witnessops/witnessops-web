slug: "/"

status:
  draft: false
  canonical: true
  last_reviewed: "2026-03-13"

seo:
  title: "Proof-Backed Security Operations | WitnessOps"
  description: "WitnessOps runs governed security work and produces signed proof bundles that customers, auditors, and counterparties can verify offline without trusting WitnessOps to stay in the loop."
  canonical_url: "https://witnessops.com/"
  robots: "index,follow"
  og_image: "/og/home"
  og_title: "WitnessOps — Portable Proof Bundles for Serious Cyber Claims"
  og_description: "Signed proof bundles with explicit lineage and offline verification for customers, auditors, and counterparties."
  twitter_card: "summary_large_image"

theme:
  brand: "witnessops"
  tone: "operator"
  proof_mark: "φ"

navbar:
  announcement:
    enabled: false
    text: ""
    href: ""
  links:
    - label: "How It Works"
      href: "/why-witnessops"
    - label: "Docs"
      href: "/docs"
    - label: "Verify"
      href: "/verify"
    - label: "Support"
