version: "1"
kind: "marketing.home"
site: "witnessops"
slug: "/"

status:
  draft: false
  canonical: true
  last_reviewed: "2026-04-23"

seo:
  title: "Portable Proof for Consequential Work | WitnessOps"
  description: "WitnessOps runs bounded workflows and produces signed receipts plus evidence packages that customers, auditors, and partners can inspect outside the source system."
  canonical_url: "https://witnessops.com/"
  robots: "index,follow"
  og_image: "/og/home"
  og_title: "WitnessOps — Consequential Work into Portable Proof"
  og_description: "Bounded workflows, signed receipts, and evidence packages that hold up outside the source system."
  twitter_card: "summary_large_image"

theme:
  brand: "witnessops"
  tone: "operator"
  proof_mark: "φ"

navbar:
  announcement:
    enabled: false
    text: ""
    href: ""
  links:
    - label: "Why WitnessOps"
      href: "/why-witnessops"
    - label: "Docs"
      href: "/docs"
    - label: "Verify"
      href: "/verify"
    - label: "Library"
      href: "/library"
    - label: "Support"
      href: "/support"
  cta:
    label: "Review"
    href: "/review"
    variant: "primary"

hero:
  title: "Consequential decisions should end in proof, not trust."
  body: "We run bounded workflows and produce signed receipts plus evidence packages that customers, auditors, and partners can inspect outside WitnessOps."
  supporting_points: []
  ai_note:
    title: "For consequential AI workflows"
    body:
      - "Prove who approved it, what ran, and what evidence survives outside the source system."
  primary_cta:
    label: "Verify a sample receipt"
    href: "/verify"
    variant: "primary"
  secondary_cta:
    label: "Request a Review"
    href: "/review/request"
    variant: "secondary"
  proof_badges: []
  media:
    type: "code_excerpt"
    code:
      language: "json"
      lines:
        - "{"
        - "  \"schemaVersion\": \"tier1-freeze-v2.1\","
        - "  \"artifactHash\": \"sha256:9d5e42a8...\","
        - "  \"executionHash\": \"sha256:c7b3f1d4...\","
        - "  \"signature\": \"ed25519:k7x9m3p2...\""
        - "}"

trust_bar:
  enabled: false
  label: "Governed consequential workflows with signed receipts and portable proof"
  items:
    - "Verification"
    - "Attestation"
    - "Status"
    - "Operator Entry"
    - "Public Narrative"

sections:
  - type: "proof_strip"
    id: "proof-strip"
    enabled: false
    title: "Receipts that survive the operation"
    body: "Signed execution receipts remain verifiable after the run is complete."
    terminal:
      language: "bash"
      lines:
        - "$ cat receipt.json"
        - ""
        - "RECEIPT:   rx-20260312-a7f3"
        - "POLICY:    policy:external-recon:v1"
        - "CHAIN:     prev=rx-20260312-e2b1"
        - "EXECUTION: sha256:9d5e42..."
        - ""
        - "SIGNATURE: ed25519:k7x9..."

  - type: "problem"
    id: "problem"
    enabled: false
    title: "Most consequential work is easy to claim. Hard to prove."
    body: "Teams ship reports, collect logs, and pass around screenshots. Then the real question lands: can this claim survive independent verification? That is where the story usually breaks."
    bullets:
      - "Reports tell a story"
      - "Logs create noise"
      - "Screenshots do not travel"
      - "Vendor trust does not scale"
    closing: "WitnessOps leaves behind reviewable evidence packages you can inspect, verify offline, and carry across teams without routing trust back through us."

  - type: "category_comparison"
    id: "category"
    enabled: false
    title: "Tools run. WitnessOps governs."
    rows:
      - left: "Nmap"
        right: "scans ports — but who approved the target?"
      - left: "Nuclei"
        right: "finds vulnerabilities — but was the scope enforced?"
      - left: "Burp Suite"
        right: "tests web apps — but can the governed path be reconstructed?"
      - left: "WitnessOps"
        right: "wraps all of them in governed, evidence-producing runbooks"
    closing: "WitnessOps is not a replacement for your tools. It is the governance layer that makes them auditable."

  - type: "why_now"
    id: "why-now"
    enabled: false
    title: "Why governed execution matters now"
    items:
      - title: "Regulators and auditors want proof, not reports"
        body: "Compliance frameworks increasingly require evidence of what was tested, not just what was found."
      - title: "AI systems need auditable security"
        body: "AI governance requires verifiable records of security testing, not self-reported summaries."
      - title: "Clients, insurers, and acquirers ask show me the evidence"
        body: "Counterparties want to verify that security operations actually happened as described."
    closing: "Trust-based security reporting is giving way to evidence-based verification."

  - type: "pipeline"
    id: "pipeline"
    enabled: false
    title: "From runbook to published evidence in four steps."
    steps:
      - label: "Define the runbook"
        value: "YAML workflow"
      - label: "Mailbox + policy gate"
        value: "M0 + E0 + P1"
      - label: "Tools execute"
        value: "E2 governed operation"
      - label: "Tier 1 chain is published"
        value: "R0 + V0"

  - type: "artifact_anatomy"
    id: "artifact"
    enabled: false
    title: "One chain. One replay path."
    body: "A WitnessOps Tier 1 chain contains the published evidence needed to inspect a governed operational action without turning the UI into a verifier."
    tree:
      root: "published-chain.json"
      entries:
        - "M0"
        - "E0"
        - "P1"
        - "E2"
        - "R0"
        - "V0"
    bullets:
      - "mailbox readiness"
      - "email control proof"
      - "policy decision"
      - "execution event"
      - "receipt binding"
      - "local verification result"
    closing: "The published chain makes the governed record replayable after the fact."

  - type: "proof_object"
    id: "proof-object"
    enabled: false
    title: "A governed operation becomes a Tier 1 receipt binding"
    body: "Richer evidence stays in adjacent manifests, state, logs, and notes. The published receipt surface exposes the frozen Tier 1 binding shape."
    code:
      language: "json"
      lines:
        - "{"
        - "  \"type\": \"R0\","
        - "  \"schemaVersion\": \"tier1-freeze-v2.1\","
        - "  \"artifactHash\": \"sha256:...\","
        - "  \"tier1\": {"
        - "    \"executionHash\": \"sha256:...\""
        - "  },"
        - "  \"pvReceipt\": {"
        - "    \"record_digest\": { \"algorithm\": \"sha256\", \"value\": \"...\" }"
        - "  }"
        - "}"

  - type: "platform_surfaces"
    id: "surfaces"
    enabled: false
    title: "A governed execution platform, not a loose toolchain"
    cards:
      - title: "Governed Execution"
        body: "Run consequential workflows and infrastructure actions under explicit control paths."
      - title: "Policy Gates"
        body: "Enforce approvals and preconditions before execution."
      - title: "Signed Receipts"
        body: "Emit signed receipt records for each governed run."
      - title: "Execution Chains"
        body: "Link runs into reconstructable continuity."
      - title: "Operator Surfaces"
        body: "Give operators deterministic execution interfaces."
      - title: "Receipt Query Layer"
        body: "Search, retrieve, and inspect receipt history."

  - type: "audiences"
    id: "audiences"
    enabled: false
    title: "Built for operators and relying parties"
    cards:
      - title: "Penetration testers"
        body: "Turn every engagement into a chain of signed receipts that records what governed action ran, who approved it, and which execution material and policy context it was bound to."
      - title: "Red teams"
        body: "Govern offensive workflows with scope enforcement and approval gates. Produce evidence, not just reports."
      - title: "Security operations"
        body: "Incident response, containment, and remediation, all governed, all receipted, all reviewable."
      - title: "Auditors and insurers"
        body: "Verify the evidence chain independently instead of relying on vendor narration or replay from memory."
      - title: "Customers and acquirers"
        body: "Inspect what ran, when it ran, and what authority bound it without depending on WitnessOps to stay in the loop."

  - type: "positioning"
    id: "positioning"
    enabled: false
    title: "Built for a world where trust is not enough."
    body: "Closed models are acceptable. Closed proof is not. WitnessOps separates execution, evidence, and verification so claims do not depend on the system that produced them."
    points:
      - "Proof should survive export."
      - "Proof should survive handoff."
      - "Proof should survive us disappearing from the middle."
      - "Do not trust the claim. Verify the artifacts."

  - type: "offer"
    id: "offer"
    enabled: false
    title: "Start with one runbook."
    price_label: "FIRST STEP"
    delivery_label: "ONE ENGAGEMENT"
    includes:
      - "one governed runbook"
      - "scope enforcement"
      - "policy gates"
      - "signed receipt output"
    body: "Pick your most critical workflow. Run it through WitnessOps. See the receipt."
    cta:
      label: "Review"
      href: "/review"
      variant: "primary"

  - type: "expansion_path"
    id: "expansion"
    enabled: false
    title: "One runbook becomes a campaign. One campaign becomes an evidence trail."
    body: "Start with a single governed operation. Chain receipts across scans, tests, and responses. Build a governed workflow history that auditors and regulators can inspect without oral reconstruction."
    ctas:
      - label: "Why WitnessOps"
        href: "/why-witnessops"
        variant: "secondary"
      - label: "The Artifact Model"
        href: "/proof-backed-security-systems"
        variant: "ghost"

  - type: "contract"
    id: "contract"
    enabled: true
    title: "Every run follows the same order."
    lede: "Approve, execute, record, publish. The result is signed receipts plus reviewable evidence packages other people can check outside WitnessOps."
    steps:
      - label: "Approve"
        body: "A policy gate must pass before any tool runs. Approval is recorded."
      - label: "Execute"
        body: "The workflow runs inside approved scope. Execution is bound to the approval context."
      - label: "Record"
        body: "A signed receipt records what ran, who approved it, and the binding context."
      - label: "Publish"
        body: "Reviewable evidence packages can be exported for outside review. The public site stays bounded to verifier fixtures, explanatory sample cases, the illustrative sample report, and the live review request lane."
    cta:
      label: "Read the verification contract"
      href: "/docs/how-it-works/verification"
      variant: "ghost"

  - type: "verifiable_items"
    id: "verifiable"
    enabled: true
    title: "Inspect sample receipts in the public verifier."
    items:
      - title: "Valid receipt sample"
        body: "A known-good receipt fixture for the clean pass path in receipt-first mode."
        proof_link: "/verify"
        proof_link_label: "Open verifier samples"
      - title: "Invalid receipt sample"
        body: "A failing receipt fixture that shows how named breaches and failures surface."
        proof_link: "/verify"
        proof_link_label: "Open verifier samples"
      - title: "Unsupported input sample"
        body: "A receipt-shaped input outside supported scope that fails closed in the public verifier."
        proof_link: "/verify"
        proof_link_label: "Open verifier samples"
    closing: "These are verifier fixtures, not live customer artifacts. Use them to see what receipt checks can confirm, what they cannot confirm, and how failure is exposed."
    ctas:
      - label: "Try verifier samples"
        href: "/verify"
        variant: "primary"
      - label: "Request a Review"
        href: "/review/request"
        variant: "ghost"

  - type: "boundary"
    id: "boundary"
    enabled: true
    title: "Trust assumptions are explicit."
    lede: "WitnessOps reduces trust. It does not pretend to remove it completely."
    items:
      - title: "Runtime integrity"
        body: "We run the execution environment. A compromised runtime could produce bad receipts. Signed hashes reduce risk, but they do not remove it."
      - title: "Key management"
        body: "Receipt signatures depend on our key infrastructure and rotation discipline."
      - title: "Schema continuity"
        body: "Historical verification depends on published, versioned receipt schemas remaining stable over time."
      - title: "Policy enforcement"
        body: "Policy gates run on our infrastructure. You can verify that evaluation happened, but not prove the policy engine is perfect."
    closing: "Trust should be named, bounded, and kept as small as possible."

  - type: "workflows"
    id: "workflows"
    enabled: true
    title: "Workflow types in. Signed receipts and reviewable evidence out."
    cards:
      - title: "Privileged access grant review"
        body: "Review whether authority, execution, and evidence line up for a real access grant path."
        proof_link: "/review/sample-cases/privileged-access-grant"
        proof_link_label: "Open explanatory sample case"
      - title: "Approval-gated containment"
        body: "Check whether containment required recorded approval before execution and whether the evidence survives outside the source system."
        proof_link: "/review/sample-cases/approval-gated-containment"
        proof_link_label: "Open explanatory sample case"
      - title: "Evidence export audit package"
        body: "Inspect whether a governed engagement can be packaged into reviewable evidence packages for outside review."
        proof_link: "/review/sample-report"
        proof_link_label: "Open illustrative sample report"
    surfaces:
      - title: "CLI"
        body: "Run workflows from the command line and write receipts locally."
      - title: "Operator surface"
        body: "Use a deterministic operator interface for bounded execution."
      - title: "API"
        body: "Trigger runs programmatically and receive receipts in response."
      - title: "Audit export"
        body: "Export reviewable evidence packages for offline review."
    ctas:
      - label: "Review workflow types"
        href: "/review"
        variant: "primary"
      - label: "Request a Review"
        href: "/review/request"
        variant: "ghost"

final_cta:
  enabled: true
  title: "Ready to test one real workflow?"
  ctas:
    - label: "Request a Review"
      href: "/review/request"
      variant: "primary"
    - label: "Read the verification contract"
      href: "/docs/how-it-works/verification"
      variant: "ghost"

