    type: "code_excerpt"
    code:
      language: "json"
      lines:
        - "{"
        - "  \"workflow\": \"ai-agent-action-proof-run\","
        - "  \"approval\": \"recorded\","
        - "  \"agentAction\": \"bounded\","
        - "  \"evidenceManifest\": \"sha256:...\","
        - "  \"verifierResult\": \"pass\","
        - "  \"signature\": \"ed25519:...\""
        - "}"

trust_bar:
  enabled: false
  label: "Approved workflows. Signed receipts. Reviewable evidence."
  items: []

sections:
  - type: "contract"
    id: "contract"
    enabled: true
    title: "What the proof run does"
    lede: "Every proof run follows the same order: approve, run, capture, verify."
    steps:
      - label: "Approve"
        body: "Define the human approval, agent/tool path, touched system, and required evidence before the action runs."
      - label: "Run"
        body: "Keep the agent-assisted action inside one approved workflow boundary."
      - label: "Capture"
        body: "Bind approval, action, result, evidence manifest, and limits into a signed receipt."
      - label: "Verify"
        body: "Export a proof bundle with a verifier result and a challenge path another party can inspect."
    closing: "The output is not another dashboard. It is a proof bundle with named verification limits."
    cta:
      label: "Read the offer"
      href: "/review"
      variant: "ghost"

  - type: "workflows"
    id: "inputs"
    enabled: true
    title: "What you need to bring"
    lede: "Start with one consequential agent-assisted workflow where later scrutiny matters."
    cards:
      - title: "The agent path"
        body: "What agent, tool, workflow, or operator handoff acted, and what system it touched."
        proof_link: "/review/request"
        proof_link_label: "Submit an agent path"
      - title: "The approval boundary"
        body: "Who approved the action, what authority they used, and what boundary the approval covered."
        proof_link: "/review/request"
        proof_link_label: "Submit approval context"
      - title: "The evidence"
        body: "Logs, prompts, tickets, artifacts, exports, outputs, or records that should survive external review."
        proof_link: "/review/request"
        proof_link_label: "Submit evidence context"
    surfaces:
      - title: "Authority map"
        body: "Name who approved the action and where authority stopped."
      - title: "Evidence manifest"
        body: "List the captured artifacts and the evidence that remained unavailable."
      - title: "Verifier result"
        body: "Show what could and could not be independently checked."
      - title: "Challenge path"
        body: "Explain how a third party can inspect or dispute the proof."
    internal_surfaces_disclosure: "Some operational surfaces remain internal, including policy authoring, receipt query, and operator administration."
    ctas:
      - label: "Request an AI Agent Action Proof Run"
        href: "/review/request"
        variant: "primary"
      - label: "View sample proof run"
        href: "https://github.com/witnessops/witnessops-sample-cases/tree/main/sample-cases/ai-agent-action-proof-run"
        variant: "ghost"

  - type: "verifiable_items"
    id: "verifiable"
    enabled: true
    title: "What another party can check"
    lede: "WitnessOps separates the agent action from the proof so the bundle can be inspected after the operation is over."
    items:
      - title: "Receipt integrity"
        body: "Whether the receipt has changed since it was signed."
        proof_link: "https://github.com/witnessops/witnessops-sample-cases/tree/main/sample-cases/ai-agent-action-proof-run"
        proof_link_label: "Open sample bundle"
      - title: "Evidence binding"
        body: "Whether the receipt points to the expected action boundary and evidence manifest."
        proof_link: "https://github.com/witnessops/witnessops-sample-cases/tree/main/sample-cases/ai-agent-action-proof-run"
        proof_link_label: "Open sample bundle"
      - title: "Failure state"
        body: "What could not be independently verified and what remains challengeable."
        proof_link: "https://github.com/witnessops/witnessops-sample-cases/tree/main/sample-cases/ai-agent-action-proof-run"
        proof_link_label: "Open sample bundle"
    ctas:
      - label: "View sample proof run"
        href: "https://github.com/witnessops/witnessops-sample-cases/tree/main/sample-cases/ai-agent-action-proof-run"
        variant: "primary"
      - label: "Read the verification contract"
        href: "/docs/how-it-works/verification"
        variant: "ghost"
    closing: "The public sample proves the receipt shape and verifier path only. It is not a production deployment, legal compliance claim, or complete AI governance program."

  - type: "boundary"
    id: "boundary"
    enabled: true
    title: "What is not claimed"
    lede: "WitnessOps reduces trust. It does not pretend to remove it completely."
    items:
      - title: "Runtime integrity"
        body: "The execution environment must be operated correctly. A compromised runtime could produce bad records."
      - title: "Key management"
        body: "Receipt signatures depend on key custody, rotation, and revocation discipline."
      - title: "Schema continuity"
        body: "Historical verification depends on stable, versioned receipt schemas."
      - title: "Policy enforcement"
        body: "Policy gates can record that evaluation happened. They do not prove every policy is perfect."
    closing: "Trust should be named, bounded, and kept as small as possible."

final_cta:
  enabled: true
  title: "Request one AI-agent proof run."
  body: "Send one completed or planned agent-assisted workflow. We define the boundary, expected evidence, verifier result, and challenge path before anything is reviewed or run."
  ctas:
    - label: "Request an AI Agent Action Proof Run"
      href: "/review/request"
      variant: "primary"
    - label: "View sample proof run"
      href: "https://github.com/witnessops/witnessops-sample-cases/tree/main/sample-cases/ai-agent-action-proof-run"
      variant: "ghost"

