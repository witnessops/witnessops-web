  title: "Agents act. WitnessOps proves."
  body: "Signed, portable proof bundles for consequential AI-agent actions. WitnessOps turns one agent-assisted workflow into a bounded proof run a buyer, auditor, security team, or operator can inspect outside the vendor UI."
  supporting_points: []
  primary_cta:
    label: "Request an AI Agent Action Proof Run"
    href: "/review/request"
    variant: "primary"
  secondary_cta:
    label: "View sample proof run"
    href: "https://github.com/witnessops/witnessops-sample-cases/tree/main/sample-cases/ai-agent-action-proof-run"
    variant: "secondary"
  proof_badges: []
