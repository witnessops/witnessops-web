seo:
  title: "Proof-Backed Security Operations | WitnessOps"
  description: "WitnessOps runs governed security operations and produces signed, timestamped receipts that can be verified independently."
  canonical_url: "https://witnessops.com/"
  robots: "index,follow"
  og_image: "/og/home"
  og_title: "WitnessOps"
  og_description: "Governed security operations with signed, independently verifiable receipts."
  twitter_card: "summary_large_image"

theme:
  brand: "witnessops"
  tone: "operator"
  proof_mark: "φ"

navbar:
  announcement:
    enabled: false
    text: ""
