version: "1"
kind: "marketing.home"
site: "witnessops"
slug: "/"

status:
  draft: false
  canonical: true
  last_reviewed: "2026-03-13"

seo:
  title: "Portable Proof for Governed Security Work | WitnessOps"
  description: "WitnessOps turns governed security work into signed, portable proof artifacts that customers, auditors, insurers, and counterparties can verify independently."
  canonical_url: "https://witnessops.com/"
  robots: "index,follow"
  og_image: "/og/home"
  og_title: "WitnessOps — Governed Security Work into Portable Proof"
  og_description: "From governed action to signed receipt to independent verification for customers, auditors, insurers, and counterparties."
  twitter_card: "summary_large_image"

theme:
  brand: "witnessops"
  tone: "operator"
  proof_mark: "φ"

navbar:
  announcement:
    enabled: false
    text: ""
    href: ""
  links:
    - label: "How It Works"
      href: "/why-witnessops"
    - label: "Docs"
      href: "/docs"
    - label: "Verify"
      href: "/verify"
    - label: "Library"
      href: "/library"
    - label: "Support"
      href: "/support"
  cta:
    label: "Contact"
    href: "/contact"
    variant: "primary"

hero:
  eyebrow: "Security workflows with proof you can verify"
  title: "WitnessOps turns governed security work into portable proof bundles that external reviewers can inspect independently."
  body: "We run bounded security workflows and produce proof bundles that third parties can verify without relying on our runtime."
  supporting_points: []
  primary_cta:
    label: "Verify a sample bundle"
    href: "/verify"
    variant: "primary"
  secondary_cta:
    label: "Request a workflow review"
    href: "/review"
    variant: "secondary"
  microcopy: "Runs in the browser against a receipt already published on this site. No account. No backend call. No data leaves the page."
  proof_badges: []
  media:
    type: "code_excerpt"
    code:
      language: "json"
      lines:
        - "{"
        - "  \"schemaVersion\": \"tier1-freeze-v2.1\","
        - "  \"artifactHash\": \"sha256:9d5e42a8...\","
        - "  \"executionHash\": \"sha256:c7b3f1d4...\","
        - "  \"signature\": \"ed25519:k7x9m3p2...\""
        - "}"

trust_bar:
  enabled: false
  label: "Governed security work with signed receipts and portable proof"
  items:
    - "Verification"
    - "Attestation"
    - "Status"
    - "Operator Entry"
    - "Public Narrative"

sections:
  - type: "proof_strip"
    id: "proof-strip"
    enabled: false
    title: "Receipts that survive the operation"
    body: "Signed execution receipts remain verifiable after the run is complete."
    terminal:
      language: "bash"
      lines:
        - "$ cat receipt.json"
        - ""
        - "RECEIPT:   rx-20260312-a7f3"
        - "POLICY:    policy:external-recon:v1"
        - "CHAIN:     prev=rx-20260312-e2b1"
        - "EXECUTION: sha256:9d5e42..."
        - ""
        - "SIGNATURE: ed25519:k7x9..."

  - type: "problem"
    id: "problem"
    enabled: false
    title: "Most security work is easy to claim. Hard to prove."
    body: "Security vendors ship reports. Teams collect logs. Screenshots get passed around. Then the real question lands: can this claim survive independent verification? That is where the story usually breaks."
    bullets:
      - "Reports tell a story"
      - "Logs create noise"
      - "Screenshots do not travel"
      - "Vendor trust does not scale"
    closing: "WitnessOps leaves behind a signed proof bundle you can inspect, verify offline, and carry across teams without routing trust back through us."

  - type: "category_comparison"
    id: "category"
    enabled: false
    title: "Tools run. WitnessOps governs."
    rows:
      - left: "Nmap"
        right: "scans ports — but who approved the target?"
      - left: "Nuclei"
        right: "finds vulnerabilities — but was the scope enforced?"
      - left: "Burp Suite"
        right: "tests web apps — but can the governed path be reconstructed?"
      - left: "WitnessOps"
        right: "wraps all of them in governed, evidence-producing runbooks"
    closing: "WitnessOps is not a replacement for your tools. It is the governance layer that makes them auditable."

  - type: "why_now"
    id: "why-now"
    enabled: false
    title: "Why governed execution matters now"
    items:
      - title: "Regulators and auditors want proof, not reports"
        body: "Compliance frameworks increasingly require evidence of what was tested, not just what was found."
      - title: "AI systems need auditable security"
        body: "AI governance requires verifiable records of security testing, not self-reported summaries."
      - title: "Clients, insurers, and acquirers ask show me the evidence"
        body: "Counterparties want to verify that security operations actually happened as described."
    closing: "Trust-based security reporting is giving way to evidence-based verification."

  - type: "pipeline"
    id: "pipeline"
    enabled: false
    title: "From runbook to published evidence in four steps."
    steps:
      - label: "Define the runbook"
        value: "YAML workflow"
      - label: "Mailbox + policy gate"
        value: "M0 + E0 + P1"
      - label: "Tools execute"
        value: "E2 governed operation"
      - label: "Tier 1 chain is published"
        value: "R0 + V0"

  - type: "artifact_anatomy"
    id: "artifact"
    enabled: false
    title: "One chain. One replay path."
    body: "A WitnessOps Tier 1 chain contains the published evidence needed to inspect a governed operational action without turning the UI into a verifier."
    tree:
      root: "published-chain.json"
      entries:
        - "M0"
        - "E0"
        - "P1"
        - "E2"
        - "R0"
        - "V0"
    bullets:
      - "mailbox readiness"
      - "email control proof"
      - "policy decision"
      - "execution event"
      - "receipt binding"
      - "local verification result"
    closing: "The published chain makes the governed record replayable after the fact."

  - type: "proof_object"
    id: "proof-object"
    enabled: false
    title: "A governed operation becomes a Tier 1 receipt binding"
    body: "Richer evidence stays in adjacent manifests, state, logs, and notes. The published receipt surface exposes the frozen Tier 1 binding shape."
    code:
      language: "json"
      lines:
        - "{"
        - "  \"type\": \"R0\","
        - "  \"schemaVersion\": \"tier1-freeze-v2.1\","
        - "  \"artifactHash\": \"sha256:...\","
        - "  \"tier1\": {"
        - "    \"executionHash\": \"sha256:...\""
        - "  },"
        - "  \"pvReceipt\": {"
        - "    \"record_digest\": { \"algorithm\": \"sha256\", \"value\": \"...\" }"
        - "  }"
        - "}"

  - type: "platform_surfaces"
    id: "surfaces"
    enabled: false
    title: "A governed execution platform, not a loose toolchain"
    cards:
      - title: "Governed Execution"
        body: "Run security and infrastructure actions under explicit control paths."
      - title: "Policy Gates"
        body: "Enforce approvals and preconditions before execution."
      - title: "Signed Receipts"
        body: "Emit signed receipt records for each governed run."
      - title: "Execution Chains"
        body: "Link runs into reconstructable continuity."
      - title: "Operator Surfaces"
        body: "Give operators deterministic execution interfaces."
      - title: "Receipt Query Layer"
        body: "Search, retrieve, and inspect receipt history."

  - type: "audiences"
    id: "audiences"
    enabled: false
    title: "Built for operators and relying parties"
    cards:
      - title: "Penetration testers"
        body: "Turn every engagement into a chain of signed receipts that records what governed action ran, who approved it, and which execution material and policy context it was bound to."
      - title: "Red teams"
        body: "Govern offensive workflows with scope enforcement and approval gates. Produce evidence, not just reports."
      - title: "Security operations"
        body: "Incident response, containment, and remediation, all governed, all receipted, all reviewable."
      - title: "Auditors and insurers"
        body: "Verify the evidence chain independently instead of relying on vendor narration or replay from memory."
      - title: "Customers and acquirers"
        body: "Inspect what ran, when it ran, and what authority bound it without depending on WitnessOps to stay in the loop."

  - type: "positioning"
    id: "positioning"
    enabled: false
    title: "Built for a world where trust is not enough."
    body: "Closed models are acceptable. Closed proof is not. WitnessOps separates execution, evidence, and verification so claims do not depend on the system that produced them."
    points:
      - "Proof should survive export."
      - "Proof should survive handoff."
      - "Proof should survive us disappearing from the middle."
      - "Do not trust the claim. Verify the bundle."

  - type: "offer"
    id: "offer"
    enabled: false
    title: "Start with one runbook."
    price_label: "FIRST STEP"
    delivery_label: "ONE ENGAGEMENT"
    includes:
      - "one governed runbook"
      - "scope enforcement"
      - "policy gates"
      - "signed receipt output"
    body: "Pick your most critical workflow. Run it through WitnessOps. See the receipt."
    cta:
      label: "Contact"
      href: "/contact"
      variant: "primary"

  - type: "expansion_path"
    id: "expansion"
    enabled: false
    title: "One runbook becomes a campaign. One campaign becomes an evidence trail."
    body: "Start with a single governed operation. Chain receipts across scans, tests, and responses. Build a governed security history that auditors and regulators can inspect without oral reconstruction."
    ctas:
      - label: "How It Works"
        href: "/why-witnessops"
        variant: "secondary"
      - label: "The Artifact Model"
        href: "/proof-backed-security-systems"
        variant: "ghost"

  - type: "contract"
    id: "contract"
    enabled: true
    title: "Every run follows four steps."
    lede: "The sequence is fixed: approve, execute, record, publish. The result is a portable bundle others can verify."
    steps:
      - label: "Approve"
        body: "A policy gate must pass before any tool runs. Approval is recorded."
      - label: "Execute"
        body: "The tool runs inside approved scope. Execution is bound to policy context."
      - label: "Record"
        body: "A signed receipt captures what ran, who approved it, and the binding context."
      - label: "Publish"
        body: "The signed bundle is published and portable. Verification does not depend on us."
    closing: "The order is fixed: approve, execute, record, publish."
    cta:
      label: "Read the verification contract"
      href: "/docs/how-it-works/verification"
      variant: "ghost"

  - type: "verifiable_items"
    id: "verifiable"
    enabled: true
    title: "Verify live proof bundles."
    lede: "These bundles are live and ready for independent review."
    items:
      - title: "Phishing triage"
        body: "Phishing triage under a governed runbook. Receipt records scope, approval, and result."
        proof_link: "/library/samples/phishing-triage"
        proof_link_label: "View phishing triage bundle"
      - title: "Approval-gated containment"
        body: "Containment action with explicit approval before execution. The receipt shows the gate."
        proof_link: "/library/samples/approval-gated-containment"
        proof_link_label: "View approval-gated containment bundle"
      - title: "Evidence export audit package"
        body: "Full evidence export from a governed engagement. Independently verifiable offline."
        proof_link: "/library/samples/evidence-export-audit-package"
        proof_link_label: "View evidence export audit bundle"
    closing: "Use these bundles to test whether evidence survives external handoff."
    ctas:
      - label: "Inspect sample bundles"
        href: "/library"
        variant: "primary"
      - label: "Request a workflow review"
        href: "/contact"
        variant: "ghost"

  - type: "boundary"
    id: "boundary"
    enabled: true
    title: "Trust assumptions still exist."
    lede: "Here is what still depends on us."
    items:
      - title: "Runtime integrity"
        body: "We run the execution environment. A compromised runtime could produce false receipts. Signed hashes reduce risk, but runtime integrity is not independently verifiable."
      - title: "Key management"
        body: "Receipt signatures depend on our key infrastructure. We use HSM-backed keys and publish key rotation policy."
      - title: "Schema continuity"
        body: "Receipt schema is versioned and published. Breaking schema changes would affect historical verification."
      - title: "Policy enforcement"
        body: "Policy gates run on our infrastructure. You can verify that evaluation occurred, but not independently prove engine correctness."
    closing: "Trust should be scoped and explicit."

  - type: "workflows"
    id: "workflows"
    enabled: true
    title: "Governed workflows with checkable proof."
    lede: "Security operations in, portable proof out."
    cards:
      - title: "Phishing triage"
        body: "Classify and scope a phishing incident under a governed runbook. Receipt records scope and approval."
        proof_link: "/library/samples/phishing-triage"
        proof_link_label: "View phishing triage bundle"
      - title: "Approval-gated containment"
        body: "Execute containment with an enforced approval gate. No execution without recorded approval."
        proof_link: "/library/samples/approval-gated-containment"
        proof_link_label: "View containment bundle"
      - title: "Evidence export audit package"
        body: "Package a governed engagement into a portable evidence bundle for external reviewers."
        proof_link: "/library/samples/evidence-export-audit-package"
        proof_link_label: "View audit package bundle"
    surfaces:
      - title: "CLI"
        body: "Run workflows from the command line. Receipts are written locally and can be published."
      - title: "Operator surface"
        body: "Deterministic execution interface for operators."
      - title: "API"
        body: "Trigger runs programmatically. Receipts return in the response."
      - title: "Audit export"
        body: "Export signed evidence bundles compatible with offline verifiers."
    internal_surfaces_disclosure: "Some surfaces are internal only: policy authoring, receipt query, and operator administration."
    ctas:
      - label: "Inspect workflow bundles"
        href: "/library"
        variant: "primary"
      - label: "Request review"
        href: "/contact"
        variant: "ghost"

final_cta:
  enabled: true
  title: "Ready to review one real workflow?"
  body: "If the proof path holds for your review context, move to scope intake. We define boundaries, scope limits, and expected evidence before execution."
  ctas:
    - label: "Request review"
      href: "/contact"
      variant: "primary"
    - label: "Read the verification contract"
      href: "/docs/how-it-works/verification"
      variant: "ghost"

