slug: "/"

status:
  draft: false
  canonical: true
  last_reviewed: "2026-04-24"

seo:
  title: "Portable Proof for Consequential Work | WitnessOps"
  description: "WitnessOps turns approved workflows into signed receipts and reviewable evidence packages that customers, auditors, and partners can inspect outside the source system."
  canonical_url: "https://witnessops.com/"
  robots: "index,follow"
  og_image: "/og/home"
  og_title: "WitnessOps — Run the Work. Keep the Proof."
  og_description: "Approved workflows, signed receipts, and evidence packages that hold up outside the source system."
  twitter_card: "summary_large_image"

theme:
  brand: "witnessops"
  tone: "operator"
  proof_mark: "φ"

navbar:
  announcement:
    enabled: false
    text: ""
    href: ""
  links:
    - label: "Why WitnessOps"
      href: "/why-witnessops"
    - label: "Docs"
      href: "/docs"
    - label: "Verify"
      href: "/verify"
    - label: "Library"
      href: "/library"
    - label: "Support"
      href: "/support"
  cta:
    label: "Request a Review"
    href: "/review/request"
    variant: "primary"

hero:
  eyebrow: "Portable proof for consequential work"
  title: "Run the work. Keep the proof."
  body: "WitnessOps turns approved workflows into signed receipts and reviewable evidence packages that customers, auditors, and partners can inspect without relying on screenshots, reports, or the original source system."
  supporting_points: []
  primary_cta:
    label: "Request a Review"
    href: "/review/request"
    variant: "primary"
  secondary_cta:
    label: "Try verifier samples"
    href: "/verify"
    variant: "secondary"
  proof_badges: []
  media:
    type: "code_excerpt"
    code:
      language: "json"
      lines:
        - "{"
        - "  \"workflow\": \"access-grant-review\"," 
        - "  \"approval\": \"recorded\"," 
        - "  \"executionHash\": \"sha256:...\"," 
        - "  \"evidenceHash\": \"sha256:...\"," 
        - "  \"signature\": \"ed25519:...\""
        - "}"

trust_bar:
  enabled: false
  label: "Approved workflows. Signed receipts. Reviewable evidence."
  items: []

sections:
  - type: "contract"
    id: "contract"
    enabled: true
    title: "What WitnessOps does"
    lede: "Every run follows the same order: approve, execute, record, publish."
    steps:
      - label: "Approve"
        body: "Define scope, authority, and required evidence before the workflow runs."
      - label: "Execute"
        body: "Run the workflow only inside the approved boundary."
      - label: "Record"
        body: "Bind approval, execution, operator context, and evidence into a signed receipt."
      - label: "Publish"
        body: "Export a reviewable evidence package another party can inspect outside WitnessOps."
    closing: "The output is not a claim. It is a receipt plus the evidence needed to check it."
    cta:
      label: "Read the verification contract"
      href: "/docs/how-it-works/verification"
      variant: "ghost"

  - type: "workflows"
    id: "inputs"
    enabled: true
    title: "What you need to bring"
    lede: "Start with one workflow where later scrutiny matters."
    cards:
      - title: "The workflow"
        body: "What happened, or what needs to happen: scope, owner, system, and expected outcome."
        proof_link: "/review/request"
        proof_link_label: "Submit a workflow"
      - title: "The authority path"
        body: "Who approved the action, what authority they used, and what boundary the approval covered."
        proof_link: "/review/request"
        proof_link_label: "Submit authority context"
      - title: "The evidence"
        body: "Logs, artifacts, outputs, tickets, exports, or records that should survive external review."
        proof_link: "/review/request"
        proof_link_label: "Submit evidence context"
    surfaces:
      - title: "Review intake"
        body: "Capture scope, authority, expected evidence, and failure conditions before the run."
      - title: "Receipt output"
        body: "Produce a signed record of what was approved, what ran, and what evidence was bound."
      - title: "Verifier samples"
        body: "Show what current receipt checks confirm and how unsupported inputs fail."
      - title: "Audit export"
        body: "Package receipts and evidence for customers, auditors, partners, or internal governance."
    internal_surfaces_disclosure: "Some operational surfaces remain internal, including policy authoring, receipt query, and operator administration."
    ctas:
      - label: "Request a Review"
        href: "/review/request"
        variant: "primary"
      - label: "Try verifier samples"
        href: "/verify"
        variant: "ghost"

  - type: "verifiable_items"
    id: "verifiable"
    enabled: true
    title: "What another party can check"
    lede: "WitnessOps separates the work from the proof so the receipt can be inspected after the operation is over."
    items:
      - title: "Receipt integrity"
        body: "Whether the receipt has changed since it was signed."
        proof_link: "/verify"
        proof_link_label: "Open verifier samples"
      - title: "Evidence binding"
        body: "Whether the receipt points to the expected execution and evidence hashes."
        proof_link: "/verify"
        proof_link_label: "Open verifier samples"
      - title: "Failure state"
        body: "Whether invalid or unsupported inputs fail closed with named reasons."
        proof_link: "/verify"
        proof_link_label: "Open verifier samples"
    ctas:
      - label: "Try verifier samples"
        href: "/verify"
        variant: "primary"
      - label: "Read the verification contract"
        href: "/docs/how-it-works/verification"
        variant: "ghost"
    closing: "The public verifier uses sample receipts. It shows the check path, not live customer material."

  - type: "boundary"
    id: "boundary"
    enabled: true
    title: "What is not claimed"
    lede: "WitnessOps reduces trust. It does not pretend to remove it completely."
    items:
      - title: "Runtime integrity"
        body: "The execution environment must be operated correctly. A compromised runtime could produce bad records."
      - title: "Key management"
        body: "Receipt signatures depend on key custody, rotation, and revocation discipline."
      - title: "Schema continuity"
        body: "Historical verification depends on stable, versioned receipt schemas."
      - title: "Policy enforcement"
        body: "Policy gates can record that evaluation happened. They do not prove every policy is perfect."
    closing: "Trust should be named, bounded, and kept as small as possible."

final_cta:
  enabled: true
  title: "Test one real workflow."
  body: "Send one completed or planned workflow. We define the boundary, expected evidence, and verification path before anything is reviewed or run."
  ctas:
    - label: "Request a Review"
      href: "/review/request"
      variant: "primary"
    - label: "Read the verification contract"
      href: "/docs/how-it-works/verification"
      variant: "ghost"

footer:
  brand_line: "WitnessOps"
  subline: "Portable proof for consequential workflows."
  links:
    - label: "Why WitnessOps"
      href: "/why-witnessops"
