name: witnessops-web
metadata:
  template: azd-init

services:
  web:
    project: ./apps/witnessops-web
    host: containerapp
    language: js
    resourceName: ca-witnessops-prod
    image: witnessops-web
    config:
      packageManager: pnpm
    docker:
      path: ./Dockerfile
      context: ../..
    hooks:
      prepackage:
        shell: sh
        run: cd ../.. && pnpm --filter witnessops-web build
